<div class="container-fluid p-4">
    <div class="d-flex align-items-center">
        <i class="bi bi-person cst-bg-2 py-2 px-3 pb-1 rounded text-white fs-3"></i>
        <h2 class="ms-4 fw-bold cst-font-3 m-0">HR Profile</h2>
    </div>
    <hr>
    <div class="fs-4">
      <p class="cst-font-1">HR Name : <span class="text-white">{{loggedHr.fname}}</span></p>
      <p class="cst-font-1">HR ID : <span class="text-white">{{loggedHr.hrId}}</span></p>
      <p class="cst-font-1">HR Email : <span class="text-white">{{loggedHr.email}}</span></p>
      <p class="cst-font-1">HR Phone : <span class="text-white">{{loggedHr.phone}}</span></p>
      <p class="cst-font-1">HR Gender : <span class="text-white">{{loggedHr.gender}}</span></p>
      <button class="cst-bg-2 py-2 px-3 rounded border-0 text-white fw-bold fs-5" (click)="onLogout()">
        <i class="bi bi-box-arrow-right me-2"></i>Logout</button>
      <button class="cst-bg-2 py-2 px-3 rounded border-0 text-white fw-bold fs-5 ms-3" (click)="onEditHR(loggedHr)">
        <i class="bi bi-pen me-2"></i>Edit</button>
    </div>
</div>
